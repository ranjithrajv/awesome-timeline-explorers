name: Check Links

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --format markdown
            --exclude-mail
            -- ./README.md
          output: lychee-report.md
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lychee-report
          path: lychee-report.md
