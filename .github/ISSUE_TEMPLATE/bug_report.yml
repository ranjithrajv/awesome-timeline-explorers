name: Report a Broken Link or Issue
description: Report a broken link, outdated entry, or other problem with the list
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping keep this list accurate! Please provide as much detail as possible.

  - type: input
    id: entry
    attributes:
      label: Affected Entry
      description: Which site or section has the issue?
      placeholder: e.g. MyRetroTVs Network
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL
      description: The URL of the affected entry
      placeholder: https://example.com
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What's wrong?
      description: Describe the issue — broken link, wrong description, site changed, etc.
      placeholder: The link returns a 404 error / The site now requires a subscription / The description is outdated
    validations:
      required: true
