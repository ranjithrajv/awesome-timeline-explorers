<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e94560" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#e94560" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Subtle scan lines -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="4" y2="0" stroke="white" stroke-width="1" opacity="0.015"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#scanlines)"/>

  <!-- Decorative timeline nodes along bottom -->
  <g transform="translate(80, 500)">
    <line x1="0" y1="0" x2="1120" y2="0" stroke="url(#accent)" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="25" x2="1120" y2="25" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
    <circle cx="120" cy="0" r="10" fill="#e94560" filter="url(#glow-filter)"/>
    <circle cx="340" cy="0" r="7" fill="#e94560" opacity="0.8"/>
    <circle cx="520" cy="0" r="12" fill="#e94560" filter="url(#glow-filter)"/>
    <circle cx="720" cy="0" r="8" fill="#e94560" opacity="0.8"/>
    <circle cx="920" cy="0" r="11" fill="#e94560" filter="url(#glow-filter)"/>
    <circle cx="1060" cy="0" r="6" fill="#e94560" opacity="0.8"/>

    <!-- Connector lines to nodes -->
    <line x1="120" y1="-60" x2="120" y2="0" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
    <line x1="520" y1="-60" x2="520" y2="0" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
    <line x1="920" y1="-60" x2="920" y2="0" stroke="#e94560" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Retro TV antennas -->
  <g opacity="0.2" stroke="#e94560" stroke-width="2.5" stroke-linecap="round">
    <line x1="140" y1="420" x2="110" y2="370"/>
    <line x1="140" y1="420" x2="170" y2="370"/>
    <line x1="1140" y1="420" x2="1110" y2="370"/>
    <line x1="1140" y1="420" x2="1170" y2="370"/>
    <rect x="125" y="420" width="30" height="22" rx="4" fill="#e94560" opacity="0.15"/>
    <rect x="1125" y="420" width="30" height="22" rx="4" fill="#e94560" opacity="0.15"/>
  </g>

  <!-- Title block -->
  <text x="640" y="200" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="3">Awesome Timeline</text>
  <text x="640" y="290" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="url(#accent)" text-anchor="middle" font-weight="bold" letter-spacing="8">EXPLORERS</text>

  <!-- Subtitle -->
  <text x="640" y="360" font-family="'Courier New', monospace" font-size="18" fill="#7a8ba8" text-anchor="middle" letter-spacing="2">INTERACTIVE HISTORY — NOSTALGIC TV — VINTAGE DIGITAL WORLDS</text>

  <!-- Badge -->
  <rect x="490" y="390" width="300" height="38" rx="19" fill="#e94560" opacity="0.9"/>
  <text x="640" y="415" font-family="'Courier New', monospace" font-size="14" fill="#ffffff" text-anchor="middle" font-weight="bold" letter-spacing="3">★ A CURATED AWESOME LIST ★</text>

  <!-- Bottom decorative bar -->
  <rect x="0" y="620" width="1280" height="20" fill="url(#accent)" opacity="0.3"/>
</svg>
